services:
  postgres:
    image: postgres:16-alpine
    container_name: monew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monew
      POSTGRES_USER: monew
      POSTGRES_PASSWORD: monew
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monew -d monew"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: monew-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: monew
      MONGO_INITDB_ROOT_PASSWORD: monew
      MONGO_INITDB_DATABASE: monew
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  mongo-data:
