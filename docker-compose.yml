services:
  postgres:
    image: postgres:16-alpine
    container_name: monew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monew
      POSTGRES_USER: monew
      POSTGRES_PASSWORD: monew
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monew -d monew"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: monew-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: monew
      MONGO_INITDB_ROOT_PASSWORD: monew
      MONGO_INITDB_DATABASE: monew
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monew-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/monew
      SPRING_DATASOURCE_USERNAME: monew
      SPRING_DATASOURCE_PASSWORD: monew
      SPRING_DATA_MONGODB_URI: mongodb://monew:monew@mongodb:27017/monew?authSource=admin
      MONEW_BACKUP_TYPE: ${MONEW_BACKUP_TYPE:-memory}
      MONEW_BACKUP_S3_BUCKET: ${MONEW_BACKUP_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
    ports:
      - "80:80"

volumes:
  postgres-data:
  mongo-data:
