spring:
  application:
    name: monew
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

monew:
  news:
    scheduler-enabled: ${MONEW_NEWS_SCHEDULER_ENABLED:false}
    cron: ${MONEW_NEWS_CRON:0 0 * * * *}
    naver:
      base-url: https://openapi.naver.com/v1/search/news.json
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      display: 20
    rss:
      - source: HANKYUNG
        url: https://www.hankyung.com/feed/all-news
  backup:
    type: ${MONEW_BACKUP_TYPE:memory}
    scheduler-enabled: ${MONEW_BACKUP_SCHEDULER_ENABLED:false}
    cron: ${MONEW_BACKUP_CRON:0 5 0 * * *}
    s3:
      bucket: ${MONEW_BACKUP_S3_BUCKET:}
