spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/monew}
    username: ${SPRING_DATASOURCE_USERNAME:monew}
    password: ${SPRING_DATASOURCE_PASSWORD:monew}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://monew:monew@localhost:27017/monew?authSource=admin}

logging:
  level:
    com.monew: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
